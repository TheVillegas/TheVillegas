<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Matías Villegas — Perfil profesional</title>
  <desc id="desc">Cabecera negra y dorada inspirada en la identidad visual de VIMU DEVS.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080808"/>
      <stop offset="0.55" stop-color="#0D0D0D"/>
      <stop offset="1" stop-color="#15110A"/>
    </linearGradient>
    <linearGradient id="gold" x1="60" y1="60" x2="1110" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8C95A"/>
      <stop offset="0.52" stop-color="#F5B33C"/>
      <stop offset="1" stop-color="#D99318"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(177 174) rotate(13) scale(280 230)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5B33C" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#F5B33C" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#F5B33C" stroke-opacity="0.035"/>
      <circle cx="0" cy="0" r="1.5" fill="#F5B33C" fill-opacity="0.06"/>
    </pattern>
    <filter id="goldGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#background)"/>
  <rect width="1200" height="360" rx="24" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="24" fill="url(#glow)"/>
  <rect x="1" y="1" width="1198" height="358" rx="23" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="2"/>

  <!-- Circuitos decorativos basados en el lenguaje visual de VIMU DEVS -->
  <g fill="none" stroke="#F5B33C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.30">
    <path d="M0 72H72L94 50H142"/>
    <path d="M0 296H62L84 274H126"/>
    <path d="M1030 48H1080L1100 68H1200"/>
    <path d="M1050 294H1098L1120 272H1200"/>
    <path d="M936 326H978L996 308H1026"/>
  </g>
  <g fill="#0D0D0D" stroke="#F5B33C" stroke-width="2" opacity="0.65">
    <circle cx="72" cy="72" r="5"/><circle cx="142" cy="50" r="5"/>
    <circle cx="62" cy="296" r="5"/><circle cx="126" cy="274" r="5"/>
    <circle cx="1030" cy="48" r="5"/><circle cx="1100" cy="68" r="5"/>
    <circle cx="1050" cy="294" r="5"/><circle cx="1120" cy="272" r="5"/>
    <circle cx="936" cy="326" r="5"/><circle cx="1026" cy="308" r="5"/>
  </g>

  <!-- Símbolo oficial de VIMU DEVS adaptado desde la versión de ícono -->
  <g transform="translate(86 82) scale(0.82)" fill="none" stroke="url(#gold)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#goldGlow)">
    <path d="M28 28L98 202L170 28"/>
    <path d="M56 28L116 178"/>
    <circle cx="28" cy="28" r="18" fill="#0D0D0D"/>
    <circle cx="170" cy="28" r="18" fill="#0D0D0D"/>
    <circle cx="98" cy="202" r="18" fill="#0D0D0D"/>
  </g>

  <line x1="280" y1="74" x2="280" y2="286" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>

  <g font-family="Poppins, Montserrat, Inter, Arial, sans-serif">
    <text x="326" y="126" fill="#F5B33C" font-size="16" font-weight="600" letter-spacing="4.2">INGENIERÍA · SOFTWARE · AGENTES DE IA</text>
    <text x="322" y="196" fill="#F8F7F4" font-size="58" font-weight="700" letter-spacing="3">MATÍAS VILLEGAS</text>
    <text x="326" y="239" fill="#C9C5BD" font-size="20" font-weight="500" letter-spacing="0.5">Estudiante de Ingeniería Civil Informática · Desarrollador Full-Stack</text>
    <text x="326" y="278" fill="#F8F7F4" font-size="17" font-weight="500" letter-spacing="1.2">Fundador de <tspan fill="#F5B33C" font-weight="700">VIMU DEVS</tspan>  ·  Valparaíso, Chile</text>
  </g>

</svg>
